# Partie 2 — Exercice guidé 2 : networks frontend / backend (démo cours)
# Usage : docker compose -f docker-compose.networks-demo.yml up -d

services:
  api:
    image: node:18-alpine
    command: sh -c "while true; do sleep 3600; done"
    networks:
      - frontend
      - backend

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
    networks:
      - backend

  nginx:
    image: nginx:alpine
    networks:
      - frontend
    ports:
      - "8081:80"

networks:
  frontend:
  backend:
