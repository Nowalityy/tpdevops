# Exercice pratique 4 — docker-compose cassé (erreurs à corriger)
# Erreur 1 : DB_HOST=postgres mais le service s'appelle "db"
# Erreur 2 : pas de healthcheck / depends_on condition sur db
services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
